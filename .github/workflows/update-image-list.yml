name: Update Image List

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'image/**'

jobs:
  update-image-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image file list
        run: |
          # Create or clear the output file
          > image_list.txt
          
          # Find all image files under image/ directory, extract basename only
          if [ -d "image" ]; then
            find image -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" -o -iname "*.gif" -o -iname "*.webp" -o -iname "*.bmp" -o -iname "*.svg" \) | \
            while read -r filepath; do
              basename "$filepath" >> image_list.txt
            done
            
            # Sort and remove duplicates
            sort -u image_list.txt -o image_list.txt
          else
            echo "image directory not found"
          fi
          
          # Display content for debugging
          echo "=== Image List ==="
          cat image_list.txt

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if [ -s image_list.txt ]; then
            git add image_list.txt
            if ! git diff --staged --quiet; then
              git commit -m "chore: update image file list [skip ci]"
              git push
            else
              echo "No changes detected, skipping commit"
            fi
          else
            echo "Image list is empty"
          fi
