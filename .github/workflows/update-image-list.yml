name: Update Image List

on:
  push:
    branches:
      - main
    paths:
      - 'image/**'

jobs:
  generate-list:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false   # 关闭自动认证，后续手动设置

      - name: Generate image list
        run: |
          if [ -d "image" ]; then
            # 查找 image/ 下的图片文件（支持多种格式）
            find image -maxdepth 1 -type f \( \
              -iname "*.jpg" -o \
              -iname "*.jpeg" -o \
              -iname "*.png" -o \
              -iname "*.gif" -o \
              -iname "*.bmp" -o \
              -iname "*.webp" -o \
              -iname "*.svg" -o \
              -iname "*.tiff" -o \
              -iname "*.tif" -o \
              -iname "*.ico" -o \
              -iname "*.avif" \
            \) -printf "%f\n" | sort > PicturesList.txt
          else
            > PicturesList.txt
          fi

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add PicturesList.txt
          if git diff --staged --quiet; then
            echo "No changes to PicturesList.txt"
            exit 0
          fi
          git commit -m "Update image list"
          # 关键步骤：将 GITHUB_TOKEN 嵌入远程 URL
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push
