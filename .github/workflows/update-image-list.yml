name: Update Image List

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'image/**'

jobs:
  update-image-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate image file list
        run: |
          # 创建或清空文件
          > image_list.txt
          
          # 查找 image 目录下的所有图片文件，只取文件名
          if [ -d "image" ]; then
            find image -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" -o -iname "*.gif" -o -iname "*.webp" -o -iname "*.bmp" -o -iname "*.svg" \) | \
            while read -r filepath; do
              basename "$filepath" >> image_list.txt
            done
            
            # 排序并去重
            sort -u image_list.txt -o image_list.txt
          else
            echo "image 目录不存在"
          fi
          
          # 显示内容
          echo "=== 图片列表 ==="
          cat image_list.txt

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if [ -s image_list.txt ]; then
            git add image_list.txt
            if ! git diff --staged --quiet; then
              git commit -m "chore: Update Pictures List [skip ci]"
              git push
            else
              echo "文件无变化，跳过提交"
            fi
          else
            echo "图片列表为空"
          fi
