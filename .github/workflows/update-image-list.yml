name: Update Image List

on:
  push:
    branches:
      - main
    paths:
      - 'image/**'

jobs:
  generate-list:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        # 移除 persist-credentials，使用默认认证

      - name: Generate image list
        run: |
          if [ -d "image" ]; then
            find image -maxdepth 1 -type f \( \
              -iname "*.jpg" -o \
              -iname "*.jpeg" -o \
              -iname "*.png" -o \
              -iname "*.gif" -o \
              -iname "*.bmp" -o \
              -iname "*.webp" -o \
              -iname "*.svg" -o \
              -iname "*.tiff" -o \
              -iname "*.tif" -o \
              -iname "*.ico" -o \
              -iname "*.avif" \
            \) -printf "%f\n" | sort > PicturesList.txt
          else
            > PicturesList.txt
          fi

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add PicturesList.txt
          if git diff --staged --quiet; then
            echo "No changes to PicturesList.txt"
          else
            git commit -m "Update image list"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
