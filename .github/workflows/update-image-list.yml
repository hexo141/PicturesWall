name: Update Image List

on:
  push:
    branches:
      - main
    paths:
      - 'image/**'          # 仅当 image/ 目录中的文件变动时触发

jobs:
  generate-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 明确授予写入权限
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # 使用 token 进行检出

      - name: Generate image list
        run: |
          if [ -d "image" ]; then
            # 查找 image/ 下的图片文件（不递归子目录），提取文件名，排序后写入
            # 支持的格式：jpg, jpeg, png, gif, bmp, webp, svg, tiff, ico, avif
            find image -maxdepth 1 -type f \( \
              -iname "*.jpg" -o \
              -iname "*.jpeg" -o \
              -iname "*.png" -o \
              -iname "*.gif" -o \
              -iname "*.bmp" -o \
              -iname "*.webp" -o \
              -iname "*.svg" -o \
              -iname "*.tiff" -o \
              -iname "*.tif" -o \
              -iname "*.ico" -o \
              -iname "*.avif" \
            \) -printf "%f\n" | sort > PicturesList.txt
          else
            # 若 image 目录不存在，则清空列表文件
            > PicturesList.txt
          fi

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add PicturesList.txt
          if git diff --staged --quiet; then
            echo "No changes to PicturesList.txt"
          else
            git commit -m "Update image list"
            git push
          fi
