name: Update Image List

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'image/**'

jobs:
  update-image-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # ✅ Critical: Use GITHUB_TOKEN for write access
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image file list
        run: |
          > image_list.txt
          
          if [ -d "image" ]; then
            find image -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" -o -iname "*.gif" -o -iname "*.webp" -o -iname "*.bmp" -o -iname "*.svg" \) | \
            xargs -n1 basename | sort -u > image_list.txt
          fi
          
          echo "=== Generated Image List ==="
          cat image_list.txt

      - name: Commit and push changes
        run: |
          # Configure git user
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Only proceed if there are changes
          if ! git diff --quiet image_list.txt; then
            git add image_list.txt
            git commit -m "chore: update image list [skip ci]"
            
            # ✅ Critical: Push using token-authenticated URL
            echo "Pushing changes..."
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref_name }}
          else
            echo "✅ No changes to commit"
          fi
