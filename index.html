<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照片墙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('https://www.loliapi.com/acg/') no-repeat center center fixed;
            background-size: cover;
        }

        /* 毛玻璃效果容器 */
        .container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* 卡片容器 */
        .card-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 40px;
            overflow-x: auto;
            scroll-behavior: smooth;
            width: 100%;
            max-width: 1400px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .card-container::-webkit-scrollbar {
            display: none;
        }

        /* 卡片样式 */
        .card {
            flex: 0 0 200px;
            height: 280px;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transform-origin: center;
        }

        .card:hover {
            transform: scale(1.3) translateY(-20px);
            z-index: 100;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .card:hover img {
            transform: scale(1.1);
        }

        .card-number {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            backdrop-filter: blur(5px);
        }

        /* 搜索按钮 */
        .search-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: white;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .search-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        /* 搜索框 */
        .search-box {
            position: fixed;
            bottom: 100px;
            left: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .search-box.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .search-input {
            padding: 12px 20px;
            border-radius: 25px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white;
            font-size: 16px;
            width: 200px;
            outline: none;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .search-submit {
            padding: 12px 25px;
            border-radius: 25px;
            border: none;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-submit:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        /* 大图预览 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.2);
        }

        .modal-close {
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            transform: scale(1.2);
            color: #ff6b6b;
        }

        /* 加载提示 */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            z-index: 1500;
        }

        /* 提示信息 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 18px;
            z-index: 1500;
            display: none;
            backdrop-filter: blur(10px);
        }

        .toast.active {
            display: block;
        }

        /* 左右导航按钮 */
        .nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: white;
            transition: all 0.3s ease;
            z-index: 500;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-50%) scale(1.1);
        }

        .nav-btn.left {
            left: 20px;
        }

        .nav-btn.right {
            right: 20px;
        }

        /* 标题 */
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            z-index: 500;
            backdrop-filter: blur(5px);
            padding: 10px 30px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.1);
        }

        /* 图片数量显示 */
        .image-count {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            z-index: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">📸 照片墙</div>
        <div class="image-count" id="imageCount">加载中...</div>
        
        <div class="nav-btn left" onclick="scrollCards(-1)">❮</div>
        <div class="card-container" id="cardContainer"></div>
        <div class="nav-btn right" onclick="scrollCards(1)">❯</div>
        
        <div class="search-btn" onclick="toggleSearch()">🔍</div>
        <div class="search-box" id="searchBox">
            <input type="text" class="search-input" id="searchInput" placeholder="输入图片编号...">
            <button class="search-submit" onclick="searchImage()">搜索</button>
        </div>
    </div>

    <div class="modal" id="modal" onclick="closeModal(event)">
        <span class="modal-close" onclick="closeModal(event)">×</span>
        <img id="modalImg" src="" alt="大图预览">
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // 配置
        const IMAGE_DIR = 'image/';
        const MAX_IMAGES = 1000; // 最大尝试查找的图片数量
        const CARD_WIDTH = 200;
        const CARD_GAP = 20;

        let images = [];
        let loadedImages = 0;

        // 初始化
        async function init() {
            await loadImages();
            setupEventListeners();
        }

        // 加载图片
        async function loadImages() {
            const cardContainer = document.getElementById('cardContainer');
            cardContainer.innerHTML = '';
            images = [];
            loadedImages = 0;

            // 尝试加载图片
            for (let i = 1; i <= MAX_IMAGES; i++) {
                const extensions = ['jpg', 'jpeg', 'png', 'bmp', 'gif', 'webp'];
                let found = false;

                for (const ext of extensions) {
                    const imgPath = `${IMAGE_DIR}${i}.${ext}`;
                    const exists = await checkImageExists(imgPath);
                    
                    if (exists) {
                        images.push({ id: i, src: imgPath });
                        createCard(i, imgPath);
                        loadedImages++;
                        found = true;
                        break;
                    }
                }

                // 如果连续10个都没找到，认为结束了
                if (!found && i > 10) {
                    let consecutiveNotFound = 0;
                    for (let j = i - 10; j < i; j++) {
                        let anyFound = false;
                        for (const ext of extensions) {
                            if (await checkImageExists(`${IMAGE_DIR}${j}.${ext}`)) {
                                anyFound = true;
                                break;
                            }
                        }
                        if (!anyFound) consecutiveNotFound++;
                    }
                    if (consecutiveNotFound >= 10) break;
                }
            }

            // 更新图片数量显示
            document.getElementById('imageCount').textContent = `共 ${loadedImages} 张图片`;

            // 随机打乱卡片顺序
            shuffleCards();

            if (loadedImages === 0) {
                showToast('未找到图片，请在同目录下创建 image/ 文件夹并放入图片');
            }
        }

        // 检查图片是否存在
        function checkImageExists(url) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve(true);
                img.onerror = () => resolve(false);
                img.src = url;
            });
        }

        // 创建卡片
        function createCard(id, src) {
            const cardContainer = document.getElementById('cardContainer');
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.id = id;
            card.dataset.src = src;
            
            card.innerHTML = `
                <img src="${src}" alt="图片${id}" loading="lazy">
                <div class="card-number">#${id}</div>
            `;

            // 悬停放大效果
            card.addEventListener('mouseenter', () => {
                card.style.zIndex = '100';
            });

            card.addEventListener('mouseleave', () => {
                card.style.zIndex = '1';
            });

            // 双击查看大图
            card.addEventListener('dblclick', () => {
                openModal(src);
            });

            cardContainer.appendChild(card);
        }

        // 随机打乱卡片
        function shuffleCards() {
            const cardContainer = document.getElementById('cardContainer');
            const cards = Array.from(cardContainer.children);
            
            // Fisher-Yates 洗牌算法
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                cardContainer.appendChild(cards[j]);
            }
        }

        // 滚动卡片
        function scrollCards(direction) {
            const cardContainer = document.getElementById('cardContainer');
            const scrollAmount = (CARD_WIDTH + CARD_GAP) * 3;
            cardContainer.scrollBy({
                left: direction * scrollAmount,
                behavior: 'smooth'
            });
        }

        // 切换搜索框
        function toggleSearch() {
            const searchBox = document.getElementById('searchBox');
            searchBox.classList.toggle('active');
            if (searchBox.classList.contains('active')) {
                document.getElementById('searchInput').focus();
            }
        }

        // 搜索图片
        async function searchImage() {
            const input = document.getElementById('searchInput');
            const searchId = input.value.trim();
            
            if (!searchId) {
                showToast('请输入图片编号');
                return;
            }

            const extensions = ['jpg', 'jpeg', 'png', 'bmp', 'gif', 'webp'];
            let found = false;

            for (const ext of extensions) {
                const imgPath = `${IMAGE_DIR}${searchId}.${ext}`;
                const exists = await checkImageExists(imgPath);
                
                if (exists) {
                    openModal(imgPath);
                    found = true;
                    break;
                }
            }

            if (!found) {
                showToast(`未找到图片 ${searchId}`);
            }

            input.value = '';
            toggleSearch();
        }

        // 打开大图
        function openModal(src) {
            const modal = document.getElementById('modal');
            const modalImg = document.getElementById('modalImg');
            modalImg.src = src;
            modal.classList.add('active');
        }

        // 关闭大图
        function closeModal(event) {
            if (event.target.id === 'modal' || event.target.className === 'modal-close') {
                const modal = document.getElementById('modal');
                modal.classList.remove('active');
            }
        }

        // 显示提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('active');
            
            setTimeout(() => {
                toast.classList.remove('active');
            }, 3000);
        }

        // 设置事件监听
        function setupEventListeners() {
            // 搜索框回车搜索
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    searchImage();
                }
            });

            // ESC 关闭模态框
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    document.getElementById('modal').classList.remove('active');
                    document.getElementById('searchBox').classList.remove('active');
                }
            });

            // 触摸滑动支持
            const cardContainer = document.getElementById('cardContainer');
            let touchStartX = 0;
            let touchEndX = 0;

            cardContainer.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });

            cardContainer.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            }, { passive: true });

            function handleSwipe() {
                const swipeThreshold = 50;
                if (touchStartX - touchEndX > swipeThreshold) {
                    scrollCards(1); // 向左滑动
                }
                if (touchEndX - touchStartX > swipeThreshold) {
                    scrollCards(-1); // 向右滑动
                }
            }

            // 鼠标滚轮横向滚动
            cardContainer.addEventListener('wheel', (e) => {
                e.preventDefault();
                cardContainer.scrollLeft += e.deltaY;
            }, { passive: false });
        }

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', init);

        // 定期刷新背景（可选，防止背景缓存）
        setInterval(() => {
            document.body.style.backgroundImage = `url('https://www.loliapi.com/acg/?t=${Date.now()}')`;
        }, 300000); // 每5分钟刷新一次
    </script>
</body>
</html>
